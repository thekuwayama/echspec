AllCops:
  TargetRubyVersion: 4.0

Layout/LineLength:
  Max: 200

Metrics/AbcSize:
  Max: 30

Metrics/BlockLength:
  Exclude:
    - 'Rakefile'
    - 'spec/*.rb'

Metrics/ClassLength:
  Max: 200

Metrics/MethodLength:
  Max: 30

Naming/MethodParameterName:
  MinNameLength: 1

Naming/FileName:
  Enabled: false

Naming/ClassAndModuleCamelCase:
  Enabled: false

Semicolon:
  AllowAsExpressionSeparator: true

Style/Documentation:
  Enabled: false

Style/FrozenStringLiteralComment:
  Enabled: false
